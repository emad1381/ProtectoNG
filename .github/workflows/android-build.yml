name: Android Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew
        continue-on-error: true

      - name: Generate Dummy Debug Keystore
        run: |
          keytool -genkeypair -v -keystore debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug, O=Android, C=US"

      - name: Generate Dummy Release Keystore
        run: |
          keytool -genkey -v -keystore my-upload-key.jks \
            -alias upload -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass testpass -keypass testpass \
            -dname "CN=Test, O=Test, L=Test, S=Test, C=US"

      - name: Download Xray and tun2socks Core Binaries
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          mkdir -p app/src/main/jniLibs/x86_64
          
          echo "Downloading Xray v26.6.1 arm64-v8a..."
          curl -L -o xray-arm64.zip https://github.com/XTLS/Xray-core/releases/download/v26.6.1/Xray-android-arm64-v8a.zip
          unzip -p xray-arm64.zip xray > app/src/main/jniLibs/arm64-v8a/libxray.so
          rm xray-arm64.zip

          echo "Downloading Xray v26.6.1 armeabi-v7a..."
          curl -L -o xray-arm32.zip https://github.com/XTLS/Xray-core/releases/download/v26.6.1/Xray-linux-arm32-v7a.zip
          unzip -p xray-arm32.zip xray > app/src/main/jniLibs/armeabi-v7a/libxray.so
          rm xray-arm32.zip

          echo "Downloading Xray v26.6.1 x86_64..."
          curl -L -o xray-x64.zip https://github.com/XTLS/Xray-core/releases/download/v26.6.1/Xray-linux-64.zip
          unzip -p xray-x64.zip xray > app/src/main/jniLibs/x86_64/libxray.so
          rm xray-x64.zip

          echo "Downloading tun2socks v2.6.0 arm64-v8a..."
          curl -L -o t2s-arm64.zip https://github.com/xjasonlyu/tun2socks/releases/download/v2.6.0/tun2socks-linux-arm64.zip
          unzip -p t2s-arm64.zip tun2socks-linux-arm64 > app/src/main/jniLibs/arm64-v8a/libtun2socks.so
          rm t2s-arm64.zip

          echo "Downloading tun2socks v2.6.0 armeabi-v7a..."
          curl -L -o t2s-arm32.zip https://github.com/xjasonlyu/tun2socks/releases/download/v2.6.0/tun2socks-linux-armv7.zip
          unzip -p t2s-arm32.zip tun2socks-linux-armv7 > app/src/main/jniLibs/armeabi-v7a/libtun2socks.so
          rm t2s-arm32.zip

          echo "Downloading tun2socks v2.6.0 x86_64..."
          curl -L -o t2s-x64.zip https://github.com/xjasonlyu/tun2socks/releases/download/v2.6.0/tun2socks-linux-amd64.zip
          unzip -p t2s-x64.zip tun2socks-linux-amd64 > app/src/main/jniLibs/x86_64/libtun2socks.so
          rm t2s-x64.zip

          ls -l app/src/main/jniLibs/arm64-v8a/
          ls -l app/src/main/jniLibs/armeabi-v7a/
          ls -l app/src/main/jniLibs/x86_64/

      - name: Build Debug and Release APKs
        run: ./gradlew assembleDebug assembleRelease
        env:
          STORE_PASSWORD: testpass
          KEY_PASSWORD: testpass
          KEYSTORE_PATH: ../my-upload-key.jks

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
