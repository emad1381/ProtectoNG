name: Android Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Generate Gradle Wrapper
        run: gradle wrapper

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew
        continue-on-error: true

      - name: Generate Dummy Release Keystore
        run: |
          keytool -genkey -v -keystore my-upload-key.jks \
            -alias upload -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass testpass -keypass testpass \
            -dname "CN=Test, O=Test, L=Test, S=Test, C=US"

      - name: Download Xray Core Binaries
        run: |
          mkdir -p app/src/main/assets
          
          echo "Downloading arm64-v8a..."
          curl -L -o xray-arm64.zip https://github.com/XTLS/Xray-core/releases/download/v1.8.4/Xray-android-arm64-v8a.zip
          unzip -p xray-arm64.zip xray > app/src/main/assets/xray_arm64-v8a
          rm xray-arm64.zip

          echo "Downloading armeabi-v7a..."
          curl -L -o xray-arm32.zip https://github.com/XTLS/Xray-core/releases/download/v1.8.4/Xray-linux-arm32-v7a.zip
          unzip -p xray-arm32.zip xray > app/src/main/assets/xray_armeabi-v7a
          rm xray-arm32.zip

          echo "Downloading x86_64..."
          curl -L -o xray-x64.zip https://github.com/XTLS/Xray-core/releases/download/v1.8.4/Xray-linux-64.zip
          unzip -p xray-x64.zip xray > app/src/main/assets/xray_x86_64
          rm xray-x64.zip

          ls -l app/src/main/assets/

      - name: Build Debug and Release APKs
        run: ./gradlew assembleDebug assembleRelease
        env:
          STORE_PASSWORD: testpass
          KEY_PASSWORD: testpass
          KEYSTORE_PATH: ../my-upload-key.jks

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
